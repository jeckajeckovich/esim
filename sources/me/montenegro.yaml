        - id: one_me_addon_15d_500gb    price_eur: 9.99   dur: 15d  dom: 500GB  wb: 5.5GB
        - id: one_me_addon_30d_1tb      price_eur: 14.99  dur: 30d  dom: 1TB    wb: 8.5GB
