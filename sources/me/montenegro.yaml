# SimRoam Montenegro Tariff Dataset v1
# =====================================
# Source: montenegro_mobile_tariffs_simroam_dataset.md (ingested 2026-Q2)
# Canonical Montenegro source — future updates override specific fields only.
# CRITICAL MODELING RULES: separate domestic_gb / unlimited_fup / wb_roaming_gb /
#   shared_wb_fair_use / eu_roaming_gb / calls_sms / local_number / esim.

meta:
  country_code: ME
  country_name: Montenegro
  last_updated: "2026-Q2"
  source_version: "draft v1"
  tier: A
  wb_roaming_region: ["ME","RS","BA","AL","MK","XK"]

  modeling_rules:
    - "Do NOT compare plans by marketed GB only."
    - "Separate domestic_unrestricted_gb from unlimited_data_with_fup_warning."
    - "wb_roaming_type must be explicit — never assume boolean true/false is enough."
    - "shared_home_quota_fair_use means the WB quota is the same pool as domestic — no separate GB."
    - "dedicated_add_on and included_quota have explicit WB GB — score directly."
    - "fair_use_quota_from_domestic means an explicit WB sub-quota carved from domestic pool."
    - "roam_like_home_fair_use has no published quota — score conservatively (35/100 max)."
    - "unlimited domestic must carry fair_use_policy:true and a warning — not treated as infinite."
    - "Telekom Montenegro publishes overage rate: ~9.32 EUR/GB after quota."
    - "Telekom MIX packages explicitly do NOT apply in roaming — mark wb=false."

