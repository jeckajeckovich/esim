      Strongest Western Balkans roaming integration in Montenegro.
      Explicit WB GB quotas published per plan — easiest to score.
      eSIM-first tourist onboarding. Data-only tourist products.
      One Pripejd has local number and voice minutes.

    wb_roaming_model:
      wb_roaming_supported: true
      wb_roaming_type: included_quota
      wb_roaming_confidence: high
      covered_region: [RS, BA, MK, AL, XK]
      notes: >
        One publishes explicit WB GB per plan — high confidence scoring.
        Tourist Daily 1GB unusual: WB quota (1.5 GB) exceeds domestic (1 GB).

