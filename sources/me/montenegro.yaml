---
uncertainties:
  - field: one_me_for_two.wb_roaming_quota_scope
    reason: "Unclear if 8.5 GB WB is per-eSIM or shared between 2 eSIMs"
    action: "Mark wb_roaming_confidence=medium, needs_verification=true"

  - field: one_me_tourist_25.unlimited_domestic_fup
    reason: "FUP threshold for unlimited domestic not published by One"
    action: "Mark fair_use_policy=true, warn — do not score as truly infinite"

  - field: one_me_renewal_25.unlimited_domestic_fup
    reason: "Same as Tourist 25 — FUP threshold not published"
    action: "Mark fair_use_policy=true"

  - field: mtel_me_tourist_15.wb_roaming_gb
    reason: "WB is shared home quota fair-use — exact WB GB NOT stated for Tourist 15"
    action: "Do not set roaming_cap_gb — use wb_type=shared_home_quota_fair_use"

  - field: mtel_me_super.unlimited_domestic_fup
    reason: "Unlimited domestic fair-use threshold not confirmed for Super Tourist"
    action: "Mark confidence=low, fair_use_policy=true"

  - field: mtel_me_super.wb_roaming_initial
    reason: "Initial WB is fair-use only — first top-up adds explicit 10 GB WB6"
    action: "Do not model initial WB as 10 GB — only after first top-up"

  - field: mtel_me_monthly.wb_roaming
    reason: "WB roaming behavior for m:tel Monthly Plan not confirmed"
    action: "Mark wb_roaming_supported=false until verified"

  - field: mtel_me_weekly.wb_roaming
    reason: "WB roaming behavior for m:tel Weekly Plan not confirmed"
    action: "Mark wb_roaming_supported=false until verified"

  - field: mtel_me_addon_*.wb_roaming
    reason: "WB behavior for post-expiry data add-ons not explicitly confirmed"
    action: "Mark wb=false until verified separately"

  - field: telekom_me_units_*.wb_roaming
    reason: "Units packages — WB roaming not confirmed; page states national traffic"
    action: "Mark wb=false until verified"

  - field: telekom_me_surf_*.promo_validity
    reason: "Promotional data valid until 2026-07-01 — may have changed"
    action: "Mark needs_verification=true, promotion_valid_until=2026-07-01"

  - field: one_me_pripejd.esim_supported
    reason: "eSIM and online purchase availability for One Pripejd not confirmed"
    action: "Mark esim=unknown, online=unknown"

  - field: telekom_me_a1_roaming_cards
    reason: "A1 Roaming Cards shown under Telekom Serbia roaming — product relationship unclear"
    action: "Do NOT add to plans.json until product relationship is clarified"

  - field: mtel_me_super.wb_cap_was_wrong
    reason: "Previous entry had wb_cap=8.0 — this was incorrect (fair-use, not a quota)"
    action: "Corrected to wb_cap=null, wb_type=shared_home_quota_fair_use_plus_bonus"

---
scoring_rules:
  wb_roaming_type_scoring:
    included_quota:                "min(100, wb_gb * 8) * confidence_multiplier"
    dedicated_add_on:              "min(100, wb_gb * 8) * confidence_multiplier"
    fair_use_quota_from_domestic:  "min(100, wb_gb * 8) * 1.0  # explicit sub-quota"
    shared_home_quota_fair_use:    "28 * confidence_multiplier  # unquantified"
    shared_home_quota_fair_use_plus_bonus: "35 * confidence_multiplier  # bonus available"
    roam_like_home_fair_use:       "22 * confidence_multiplier  # least reliable"

  confidence_multipliers:
    high: 1.0
    medium: 0.75
    low: 0.5

  unlimited_domestic:
    no_fair_use:  "score as 50 GB equivalent"
    with_fair_use: "score as 40 GB equivalent, apply -5 point penalty"

  telekom_roaming_safety_boost:
    applies_to: [telekom_me_tourist, telekom_me_net1, telekom_me_net7, telekom_me_net15, telekom_me_net30]
    reason: "Published SMS control codes and explicit overage rate = highest transparency"
    boost: "+15 clarity_score"

  mtel_first_top_up_note:
    applies_to: [mtel_me_tourist_20, mtel_me_super]
    note: >
      First top-up unlocks 10 GB WB6. The recommendation engine should surface this
      as a 'savings tip' — not automatically add 10 GB to initial score.

