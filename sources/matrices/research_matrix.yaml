          eu_roaming_gb: 6           # confirmed — notably low
          duration_days: 30
          calls_sms: true
          esim: unknown              # eSIM exists but tourist path unclear
          store_required: true
          activation_before_arrival: false
          foreign_passport_accepted: true   # confirmed
          codice_fiscale_required: uncertain
          plan_id_in_db: iliad_it_giga_180
          db_confidence: needs_review
        - title: "Giga 120"
          price_eur: 7.99
          domestic_data_gb: 120
          eu_roaming_gb: 6
          duration_days: 30
          store_required: true
          foreign_passport_accepted: true
          codice_fiscale_required: uncertain
          plan_id_in_db: null        # not yet in DB — add after CF question resolved
      confirmed_fields:
        foreign_passport_accepted: true
        store_required: true
        eu_roaming_gb_giga180: 6
        price_eur_giga180: 9.99
        local_number: true
      key_research_question: >
        Is Codice Fiscale required for Iliad Giga 180 prepaid?
