fr:
  country_name: France
  market_context: >
    France has technically excellent prepaid plans (Free Mobile especially)
    but a structural tourist blocker: French address or French bank card
    typically required for online activation.
    This is NOT confirmed for all operators — it is the key research question.
    Until the address requirement is clarified, France should not be promoted
    as a tourist SIM destination.

  operators:

    free_mobile_fr:
      name: Free Mobile France
      operator_id: free_mobile_fr
      source_url: https://mobile.free.fr/forfaits/
      research_status: needs_verification
      last_verified: "2026-Q2"
      tourist_usable: unknown        # CRITICAL OPEN QUESTION
      plans_partially_known:
        - title: "Forfait 5G"
          price_eur: 9.99
          domestic_data_gb: 300
          eu_roaming_gb: 25          # confirmed from official page
          eu_roaming_fup: "FUP applies — exact threshold not published clearly"
          duration_days: 30
          calls_sms: true
          esim: true
          plan_id_in_db: free_mobile_fr_forfait_5g
          db_confidence: needs_review
      confirmed_fields:
        price_eur: 9.99
        eu_roaming_gb: 25
        esim: true
        local_number: true
        renewable: true
      unconfirmed_fields:
        french_address_required: "reported yes — but tourist workarounds reported by community"
        foreign_passport_ok: "reported yes — not officially documented"
        french_bank_card_required: "uncertain — some report international cards work"
        activation_before_arrival: unknown
      key_research_question: >
        Can a tourist without French address or IBAN activate with:
        - foreign passport (e.g. Serbian, Russian, American)
        - international Mastercard/Visa
        - hotel address or no address
        This is the single blocker. If YES → upgrade to verified_manual.
        If NO → mark tourist_usable: false and add clear warning.
      verification_method: >
        1. Visit https://mobile.free.fr/forfaits/
        2. Begin subscription flow
        3. Check what address/payment fields are required
        4. Try completing with foreign card
        Alternatively: check r/expats, r/france, nomad forums for recent reports.
      roaming_exclusions: [CH, UK, RS, ME, AL, BA, MK]

    orange_fr:
      name: Orange France
      operator_id: orange_fr
      source_url: https://boutique.orange.fr/mobile/offres-mobiles/forfaits-prepaye
      research_status: needs_verification
      tourist_usable: unknown
      fields_to_verify:
