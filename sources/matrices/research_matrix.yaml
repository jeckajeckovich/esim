# SimRoam — EU Telecom Research Matrix
# =======================================
# Purpose: structured tracker for manual verification of prepaid/eSIM
#          options for tourists and foreigners without local residency.
#
# How to use:
#   1. Pick an operator from the priority_queue below
#   2. Visit the source_url
#   3. Fill in the unknown fields
#   4. If verified: update operators.json + add/update plan in plans.json
#   5. Mark research_status: verified_official or verified_manual
#   6. Set do_not_surface: false in the relevant source YAML
#
# Field key:
#   true       = confirmed yes
#   false      = confirmed no
#   unknown    = not yet verified — do NOT assume
#   "text"     = specific note
#
# Confidence levels:
#   verified_official   — directly from operator's official page
#   verified_manual     — cross-checked from official page manually
#   needs_verification  — some data available, key fields unconfirmed
#   seed                — operator listed, no plan data yet
#
# CRITICAL RULE: domestic_data_gb ≠ eu_roaming_gb
#   Always document both separately.
#   "EU roaming included" alone is NOT enough.

schema_version: "2026-Q2"

---
priority_queue:
  tier_1_verify_now:
    - operator: free_mobile_fr
      why: "Best EU roaming (25 GB) in France. Blocker: French address requirement for tourists unverified."
      key_question: "Can a non-EU tourist activate with foreign passport + no French address?"

    - operator: digi_es
      why: "Cheapest data in Spain. Tourism-heavy country with no verified option."
      key_question: "Is NIE/address required, or just passport? Is eSIM available?"

    - operator: iliad_it
      why: "Price and foreign passport confirmed. Blocker: Codice Fiscale uncertainty."
      key_question: "Is Codice Fiscale required for prepaid? Can it be obtained online?"

    - operator: lyca_de
      why: "Only unverified German option. May fill price gap below Vodafone."
      key_question: "Current plan prices, EU roaming GB, tourist activation."

  tier_2_verify_next:
    - orange_fr
    - bouygues_fr
    - vodafone_es
    - tim_it
    - play_pl
    - plus_pl
    - tmobile_pl

  tier_3_lower_priority:
    - sfr_fr
    - orange_es
    - movistar_es
    - vodafone_it
    - windtre_it

