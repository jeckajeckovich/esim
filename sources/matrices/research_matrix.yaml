        domestic_data_gb: unknown
        eu_roaming_gb: unknown         # KEY — document separately
        esim_supported: unknown
        remote_activation: unknown
        french_address_required: unknown
        foreign_passport_ok: unknown
        calls_sms: unknown
      notes: "Major operator. May have similar address blocker to Free Mobile."

    bouygues_fr:
