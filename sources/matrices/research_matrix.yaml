  market_context: >
    Italy is a high-priority tourist destination with a structural barrier:
    Codice Fiscale (Italian tax ID) may be required by some operators.
    Iliad is the exception — foreign passport accepted at stores.
    Online activation for tourists is NOT confirmed for any Italian operator.
    EU roaming caps in Italy are notably LOW relative to domestic data:
    Iliad gives 180 GB domestic but only 6 GB EU roaming.
    Always document these separately.

  operators:

    iliad_it:
      name: Iliad Italy
      operator_id: iliad_it
      source_url: https://www.iliad.it/tariffe/
      research_status: needs_verification
      last_verified: "2026-Q2"
