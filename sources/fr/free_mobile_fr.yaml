meta:
  country_code: FR
  country_name: France
  last_updated: "2026-Q2"
  tier: A
  market_note: >
    France has technically excellent prepaid plans (Free Mobile is the
    standout at €9.99/month with 25 GB EU roaming) but activation for
    tourists is blocked by a French address/bank card requirement that
    is not officially documented as bypassable.
    DO NOT add any French operator to the recommendation engine until
    the tourist activation path is manually verified.

operators:

  free_mobile_fr:
    operator_id: free_mobile_fr
    name: Free Mobile France
    source_url: https://mobile.free.fr/forfaits/
    roaming_info_url: https://mobile.free.fr/assistance/155-57-voyager-en-europe.html
    source_name: Free Mobile France official
    last_verified: "2026-Q2"
    verified_by: manual_partial
    data_confidence: needs_review
    research_status: needs_verification
    tourist_usable: unknown
    do_not_surface: true

    confirmed_data:
      esim: true
      local_number: true
      renewable: true
      auto_renew: true

    unconfirmed_blocker:
      french_address_required: "likely yes — official site shows address field"
      french_payment_method: "likely — some international cards reported to work"
      foreign_passport_accepted: "reported yes by community, not officially documented"

    key_question: >
      Can a tourist without French address activate with:
      - foreign (non-EU) passport
      - international Mastercard/Visa
      If YES: upgrade to verified_manual, set tourist_usable: true
      If NO: set tourist_usable: false, update plans.json warning

    plans:
      - raw_title: "Free Mobile Forfait 5G"
        raw_price_eur: 9.99
