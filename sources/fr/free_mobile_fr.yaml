        raw_calls_sms: true
        raw_esim: true
        raw_online_purchase: true
        raw_local_number: true
        raw_renewable: true
        raw_auto_renew: true
        raw_kyc: true
        raw_french_address_required: true
        raw_foreign_passport_confirmed: false
        data_confidence: needs_review
        plan_id_in_db: free_mobile_fr_forfait_5g
        confidence_note: >
          Price €9.99 confirmed. EU roaming 25 GB confirmed.
          Tourist activation WITHOUT French address is NOT confirmed.

