  last_updated: "2026-Q2"
  tier: A
  market_note: >
    Spain has competitive prepaid with genuine tourist potential.
    Key difference from France/Italy: Spanish prepaid does NOT require NIE
    (National Identity Number) — passport is generally sufficient.
    This makes Spain more tourist-accessible in principle, but needs per-operator confirmation.
    DIGI Spain is the price leader (Romanian MVNO on Movistar network).
    No Spanish operator has verified plan data in plans.json yet.
    DO NOT add plans until price + EU roaming GB confirmed from official source.

